<header class="navbar">
  <div class="navbar__brand">
    <a routerLink="/home" class="brand" aria-label="SAT-MED inicio">
      <span class="brand__mark">+</span>
      <span class="brand__text">SAT-MED</span>
    </a>
  </div>

  <nav class="navbar__center" aria-label="Navegación principal">
    <a
      routerLink="/home"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link"
    >
      Inicio
    </a>

    <a routerLink="/agendar-hora" routerLinkActive="is-active" class="nav-link">
      Agendar Hora
    </a>

    <a routerLink="/mis-atenciones" routerLinkActive="is-active" class="nav-link">
      Mis Atenciones
    </a>

    <a routerLink="/recetas-indicaciones" routerLinkActive="is-active" class="nav-link">
      Recetas e Indicaciones
    </a>
  </nav>

  <div class="navbar__right">
    <a routerLink="/login" class="login-btn">Iniciar sesión</a>
  </div>
</header>
