<div class="page-shell">
  <main class="main">
    <div class="form-wrap">
      <section class="card">
        <div class="card-head">
          <h1>SAT-MED</h1>
          <p>Portal de Inicio de Sesión</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-grid" novalidate>
          <section class="section">
            <h2>Acceso</h2>

            <div class="grid-1">
              <div class="field field-full">
                <input id="email" type="email" placeholder=" " formControlName="email" />
                <label for="email">Email</label>
                @if (isInvalid('email')) {
                  <p class="error">{{ getError('email') }}</p>
                }
              </div>

              <div class="field field-full">
                <input id="password" type="password" placeholder=" " formControlName="password" />
                <label for="password">Contraseña</label>
                @if (isInvalid('password')) {
                  <p class="error">{{ getError('password') }}</p>
                }
              </div>
            </div>
          </section>

          <div class="actions">
            <button type="submit" class="btn-primary btn-submit" [disabled]="loading">
              @if (loading) {
                <svg class="spinner" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                  <circle class="spinner-track" cx="12" cy="12" r="10"></circle>
                  <path class="spinner-head" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              }
              Iniciar Sesión
            </button>
          </div>

          @if (message) {
            <p class="message">{{ message }}</p>
          }

          <div class="login-link">
            <span>¿No tienes cuenta?</span>
            <a routerLink="/registro">Regístrate</a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>
